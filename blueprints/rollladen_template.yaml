blueprint:
  name: "Rollladen: Fenster-/Regen-/Kälte-/Sonnenaufgang-Logik (komplett)"
  description: >
    Vereint Taster (hoch/rille/runter) + Fensterschutz + Regenschutz + Kälteschutz
    + 1h vor Sonnenaufgang auf Rille (optional, z.B. zum Lüften im Urlaub).
    Nutzt zwei Input-Booleans als Merker (Öffnen angefordert / Schließen vorgemerkt)
    und setzt diese ereignisbasiert automatisch zurück.
  domain: automation
  author: "Copilot"
  homeassistant:
    min_version: "2026.4.0"

  input:
    cover_entity:
      name: Rollladen (Cover)
      selector:
        entity:
          filter:
            - domain: cover

    window_sensor:
      name: Fenster (Binary Sensor / Gruppe)
      selector:
        entity:
          filter:
            - domain: binary_sensor

    # --- Taster ---
    button_up:
      name: Taste "Hoch" (Input Button)
      selector:
        entity:
          filter:
            - domain: input_button
    button_rille:
      name: Taste "Rille" (Input Button)
      selector:
        entity:
          filter:
            - domain: input_button
    button_down:
      name: Taste "Runter" (Input Button)
      selector:
        entity:
          filter:
            - domain: input_button

    # --- Helfer / Merker ---
    helper_pending_close:
      name: Helfer "Schließen vorgemerkt" (Input Boolean)
      description: Merkt Runter-Wunsch bei offenem Fenster.
      selector:
        entity:
          filter:
            - domain: input_boolean

    helper_open_override:
      name: Helfer "Öffnen angefordert" (Input Boolean)
      description: Blockiert Auto-Schließen nach Fenster-Schließen, wenn bewusst geöffnet wurde.
      selector:
        entity:
          filter:
            - domain: input_boolean

    # --- Rille ---
    rille_position:
      name: Rille-Position (%)
      default: 16
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: slider

    # --- Sonnenaufgang-Rille (allgemeiner Helper) ---
    sunrise_rille_enable:
      name: Helper "Sonnenaufgang Rille aktiv" (Input Boolean)
      description: Allgemeiner Schalter, um die Sonnenaufgang-Rille-Logik zu aktivieren.
      selector:
        entity:
          filter:
            - domain: input_boolean

    sunrise_offset:
      name: Offset vor Sonnenaufgang
      description: "Format HH:MM:SS, z.B. -01:00:00 = 1 Stunde vor Sonnenaufgang"
      default: "-01:00:00"
      selector:
        text:

    sunrise_requires_window_open:
      name: Sonnenaufgang-Rille nur wenn Fenster offen?
      default: true
      selector:
        boolean:

    # --- Kälteschutz ---
    temp_sensor:
      name: Temperatursensor (optional, für Kälteschutz)
      selector:
        entity:
          filter:
            - domain: sensor

    temp_below:
      name: Kälteschutz: Schwelle (unter °C)
      default: 17
      selector:
        number:
          min: -20
          max: 40
          step: 0.5
          mode: slider

    temp_for:
      name: Kälteschutz: Dauer unter Schwelle
      default:
        minutes: 5
      selector:
        duration:

    # --- Regenschutz ---
    rain_sensor:
      name: Regensensor (Binary Sensor)
      selector:
        entity:
          filter:
            - domain: binary_sensor

    rain_enable:
      name: Regenüberwachung aktiv (Input Boolean)
      description: Muss ON sein, damit Regenschutz greift.
      selector:
        entity:
          filter:
            - domain: input_boolean

    rain_for:
      name: Regensensor muss wie lange an sein?
      default:
        seconds: 5
      selector:
        duration:

mode: restart

variables:
  cover_entity: !input cover_entity
  window_sensor: !input window_sensor

  button_up: !input button_up
  button_rille: !input button_rille
  button_down: !input button_down

  helper_pending_close: !input helper_pending_close
  helper_open_override: !input helper_open_override

  rille_position: !input rille_position

  sunrise_rille_enable: !input sunrise_rille_enable
  sunrise_offset: !input sunrise_offset
  sunrise_requires_window_open: !input sunrise_requires_window_open

  temp_sensor: !input temp_sensor
  temp_below: !input temp_below
  temp_for: !input temp_for

  rain_sensor: !input rain_sensor
  rain_enable: !input rain_enable
  rain_for: !input rain_for

trigger:
  # --- Taster ---
  - platform: state
    entity_id: !input button_up
    id: btn_up

  - platform: state
    entity_id: !input button_rille
    id: btn_rille

  - platform: state
    entity_id: !input button_down
    id: btn_down

  # --- Fenster ---
  - platform: state
    entity_id: !input window_sensor
    to: "on"
    id: window_open

  - platform: state
    entity_id: !input window_sensor
    to: "off"
    id: window_closed

  # --- Kälte ---
  - platform: numeric_state
    entity_id: !input temp_sensor
    below: !input temp_below
    for: !input temp_for
    id: temp_cold

  # --- Regen ---
  - platform: state
    entity_id: !input rain_sensor
    to: "on"
    for: !input rain_for
    id: rain_on

  # --- 1h vor Sonnenaufgang (offset als Input) ---
  - platform: sun
    event: sunrise
    offset: !input sunrise_offset
    id: sunrise_offset_trigger

action:
  - choose:

      ######################################################################
      # 0) SONNENAUFGANG (Offset) -> RILLE
      #    Wenn enabled + Rollladen nicht geschlossen
      #    Optional: nur wenn Fenster offen (Lüften)
      ######################################################################
      - conditions:
          - condition: trigger
            id: sunrise_offset_trigger
          - condition: state
            entity_id: !input sunrise_rille_enable
            state: "on"
          - condition: template
            value_template: >
              {% if sunrise_requires_window_open %}
                {{ is_state(window_sensor, 'on') }}
              {% else %}
                true
              {% endif %}
          - condition: template
            value_template: >
              {{ not is_state(cover_entity, 'closed') }}
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: !input helper_open_override
          - service: input_boolean.turn_off
            target:
              entity_id: !input helper_pending_close
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input rille_position

      ######################################################################
      # 1) REGENSCHUTZ:
      #    Regen an + Fenster offen + Regenüberwachung an -> schließen
      #    (setzt beide Merker zurück)
      ######################################################################
      - conditions:
          - condition: trigger
            id: rain_on
          - condition: state
            entity_id: !input window_sensor
            state: "on"
          - condition: state
            entity_id: !input rain_enable
            state: "on"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id:
                - !input helper_pending_close
                - !input helper_open_override
          - service: cover.close_cover
            target:
              entity_id: !input cover_entity

      ######################################################################
      # 2) KÄLTESCHUTZ:
      #    < Schwelle (for) + Fenster offen -> schließen
      #    (setzt beide Merker zurück)
      ######################################################################
      - conditions:
          - condition: trigger
            id: temp_cold
          - condition: state
            entity_id: !input window_sensor
            state: "on"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id:
                - !input helper_pending_close
                - !input helper_open_override
          - service: cover.close_cover
            target:
              entity_id: !input cover_entity

      ######################################################################
      # 3) TASTE HOCH -> öffnen + override ON + pending_close OFF
      ######################################################################
      - conditions:
          - condition: trigger
            id: btn_up
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: !input helper_open_override
          - service: input_boolean.turn_off
            target:
              entity_id: !input helper_pending_close
          - service: cover.open_cover
            target:
              entity_id: !input cover_entity

      ######################################################################
      # 4) TASTE RILLE -> Position + override ON + pending_close OFF
      ######################################################################
      - conditions:
          - condition: trigger
            id: btn_rille
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: !input helper_open_override
          - service: input_boolean.turn_off
            target:
              entity_id: !input helper_pending_close
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input rille_position

      ######################################################################
      # 5) TASTE RUNTER:
      #    - Fenster offen -> pending_close ON (nicht fahren)
      #    - Fenster zu -> schließen + pending_close OFF
      #    - override wird dabei OFF gesetzt (man will ja schließen)
      ######################################################################
      - conditions:
          - condition: trigger
            id: btn_down
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input helper_open_override
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input window_sensor
                    state: "on"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input helper_pending_close
              - conditions:
                  - condition: state
                    entity_id: !input window_sensor
                    state: "off"
                sequence:
                  - service: cover.close_cover
                    target:
                      entity_id: !input cover_entity
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input helper_pending_close

      ######################################################################
      # 6) FENSTER AUF:
      #    Wenn Rollladen unten (<=5% oder closed) -> hochfahren + pending_close ON
      ######################################################################
      - conditions:
          - condition: trigger
            id: window_open
        sequence:
          - condition: template
            value_template: >
              {% set pos = state_attr(cover_entity, 'current_position') %}
              {% if pos is none %}
                {{ is_state(cover_entity, 'closed') }}
              {% else %}
                {{ pos|int <= 5 }}
              {% endif %}
          - service: cover.open_cover
            target:
              entity_id: !input cover_entity
          - service: input_boolean.turn_on
            target:
              entity_id: !input helper_pending_close

      ######################################################################
      # 7) FENSTER ZU:
      #    - pending_close ON & override OFF -> schließen + pending_close OFF
      #    - pending_close ON & override ON -> pending_close OFF (nicht schließen)
      #    (zusätzlich: pending_close wird immer OFF, damit nichts "hängen" bleibt)
      ######################################################################
      - conditions:
          - condition: trigger
            id: window_closed
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input helper_pending_close
                    state: "on"
                  - condition: state
                    entity_id: !input helper_open_override
                    state: "off"
                sequence:
                  - service: cover.close_cover
                    target:
                      entity_id: !input cover_entity
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input helper_pending_close

              - conditions:
                  - condition: state
                    entity_id: !input helper_pending_close
                    state: "on"
                  - condition: state
                    entity_id: !input helper_open_override
                    state: "on"
                sequence:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input helper_pending_close

          # Safety-Cleanup: pending_close soll danach sicher aus sein
          - service: input_boolean.turn_off
            target:
              entity_id: !input helper_pending_close

    default: []
